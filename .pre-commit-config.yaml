repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]
  - repo: local
    hooks:
      - id: npm-lint
        name: ESLint
        entry: npm run lint
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types_or: [ts, tsx]
